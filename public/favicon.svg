<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Gold star base -->
  <polygon
    points="32,2 39.5,22 61,22 44.5,35 51,57 32,43 13,57 19.5,35 3,22 24.5,22"
    fill="#F5C800"
    stroke="#c07800"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Sunburst inner highlight -->
  <polygon
    points="32,8 38,23 55,23 41.5,33 47,52 32,42 17,52 22.5,33 9,23 26,23"
    fill="#ffe55a"
    opacity="0.5"
  />

  <!-- Eagle left wing -->
  <path d="M 8,32 C 12,25 20,27 28,28 L 32,30 C 24,32 16,34 8,32 Z" fill="#1a0c02"/>
  <!-- Eagle right wing -->
  <path d="M 56,32 C 52,25 44,27 36,28 L 32,30 C 40,32 48,34 56,32 Z" fill="#1a0c02"/>
  <!-- Wing spread bar -->
  <ellipse cx="32" cy="30" rx="20" ry="3.5" fill="#241005"/>

  <!-- Eagle body -->
  <ellipse cx="32" cy="40" rx="6" ry="9" fill="#2a1205"/>

  <!-- White bald-eagle head -->
  <circle cx="32" cy="26" r="6" fill="#f5e8c8"/>

  <!-- Hooked beak -->
  <path d="M 36.5,25.5 L 44,27.5 L 41,32 L 37,29.5 Z" fill="#F5C800"/>
  <path d="M 41,32 C 39,34.5 37,33.5 36.5,31" stroke="#b07000" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="37" cy="24.5" r="2.2" fill="#0f0800"/>
  <circle cx="37.8" cy="23.8" r="0.8" fill="white" opacity="0.85"/>

  <!-- Tail feathers -->
  <line x1="28" y1="48" x2="26" y2="57" stroke="#1a0c02" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="49" x2="32" y2="58" stroke="#1a0c02" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="48" x2="38" y2="57" stroke="#1a0c02" stroke-width="2.5" stroke-linecap="round"/>
</svg>
