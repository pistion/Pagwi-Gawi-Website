<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420">
  <defs>
    <linearGradient id="ga" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3a1800"/>
      <stop offset="28%"  stop-color="#a06010"/>
      <stop offset="58%"  stop-color="#e8cc6a"/>
      <stop offset="82%"  stop-color="#c09030"/>
      <stop offset="100%" stop-color="#5a3000"/>
    </linearGradient>
    <linearGradient id="gb" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a1800"/>
      <stop offset="28%"  stop-color="#a06010"/>
      <stop offset="58%"  stop-color="#e8cc6a"/>
      <stop offset="82%"  stop-color="#c09030"/>
      <stop offset="100%" stop-color="#5a3000"/>
    </linearGradient>
    <linearGradient id="gc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5a3000"/>
      <stop offset="50%"  stop-color="#d4a840"/>
      <stop offset="100%" stop-color="#4a2000"/>
    </linearGradient>
  </defs>

  <!-- ═══ SCROLL 1 — large S-curl, bottom-left to centre ═══ -->
  <path d="M 25,400 C 38,330 72,268 118,238
           C 164,208 200,218 212,248
           C 224,278 210,310 188,316
           C 166,322 148,306 154,290
           C 160,274 178,276 174,288"
        fill="none" stroke="url(#ga)" stroke-width="6" stroke-linecap="round" opacity="0.92"/>

  <!-- feather fan from scroll-1 knee -->
  <path d="M 118,238 C 88,196 52,170 18,142" fill="none" stroke="url(#ga)" stroke-width="3.8" stroke-linecap="round" opacity="0.85"/>
  <path d="M 118,238 C 100,192 84,160 72,118"  fill="none" stroke="url(#ga)" stroke-width="3.2" stroke-linecap="round" opacity="0.80"/>
  <path d="M 118,238 C 116,190 118,158 120,112" fill="none" stroke="url(#ga)" stroke-width="3.2" stroke-linecap="round" opacity="0.80"/>
  <path d="M 118,238 C 132,193 144,162 158,120" fill="none" stroke="url(#ga)" stroke-width="2.8" stroke-linecap="round" opacity="0.75"/>
  <path d="M 118,238 C 146,198 162,168 182,132" fill="none" stroke="url(#ga)" stroke-width="2.4" stroke-linecap="round" opacity="0.70"/>
  <!-- collar knot -->
  <ellipse cx="118" cy="238" rx="6" ry="5" fill="url(#ga)" opacity="0.95"/>
  <ellipse cx="118" cy="238" rx="3" ry="2.5" fill="#f0e080" opacity="0.7"/>

  <!-- trailing tail from scroll-1 end -->
  <path d="M 212,248 C 238,265 258,278 272,308" fill="none" stroke="url(#ga)" stroke-width="2.6" stroke-linecap="round" opacity="0.70"/>

  <!-- ═══ SCROLL 2 — mirror S-curl, top-right to centre ═══ -->
  <path d="M 395,20 C 382,90 348,152 302,182
           C 256,212 220,202 208,172
           C 196,142 210,110 232,104
           C 254,98 272,114 266,130
           C 260,146 242,144 246,132"
        fill="none" stroke="url(#gb)" stroke-width="6" stroke-linecap="round" opacity="0.92"/>

  <!-- feather fan from scroll-2 knee -->
  <path d="M 302,182 C 332,224 368,250 402,278" fill="none" stroke="url(#gb)" stroke-width="3.8" stroke-linecap="round" opacity="0.85"/>
  <path d="M 302,182 C 320,228 336,260 348,302" fill="none" stroke="url(#gb)" stroke-width="3.2" stroke-linecap="round" opacity="0.80"/>
  <path d="M 302,182 C 304,230 302,262 300,308" fill="none" stroke="url(#gb)" stroke-width="3.2" stroke-linecap="round" opacity="0.80"/>
  <path d="M 302,182 C 288,227 276,258 262,300" fill="none" stroke="url(#gb)" stroke-width="2.8" stroke-linecap="round" opacity="0.75"/>
  <path d="M 302,182 C 274,222 258,252 238,288" fill="none" stroke="url(#gb)" stroke-width="2.4" stroke-linecap="round" opacity="0.70"/>
  <!-- collar knot -->
  <ellipse cx="302" cy="182" rx="6" ry="5" fill="url(#gb)" opacity="0.95"/>
  <ellipse cx="302" cy="182" rx="3" ry="2.5" fill="#f0e080" opacity="0.7"/>

  <!-- trailing tail from scroll-2 end -->
  <path d="M 208,172 C 182,155 162,142 148,112" fill="none" stroke="url(#gb)" stroke-width="2.6" stroke-linecap="round" opacity="0.70"/>

  <!-- ═══ SMALL SCROLL — mid-left ═══ -->
  <path d="M 52,318 C 66,290 96,278 118,290
           C 140,302 144,326 128,336
           C 112,346 96,334 102,322
           C 108,310 122,314 118,324"
        fill="none" stroke="url(#gc)" stroke-width="4.5" stroke-linecap="round" opacity="0.82"/>
  <ellipse cx="118" cy="290" rx="4.5" ry="3.5" fill="url(#gc)" opacity="0.9"/>

  <!-- ═══ SMALL SCROLL — mid-right ═══ -->
  <path d="M 368,102 C 354,130 324,142 302,130
           C 280,118 276,94 292,84
           C 308,74 324,86 318,98
           C 312,110 298,106 302,96"
        fill="none" stroke="url(#gc)" stroke-width="4.5" stroke-linecap="round" opacity="0.82"/>
  <ellipse cx="302" cy="130" rx="4.5" ry="3.5" fill="url(#gc)" opacity="0.9"/>

  <!-- ═══ TINY CORNER CURL — top-left (for tiling continuity) ═══ -->
  <path d="M 0,80 C 12,60 28,52 42,62 C 56,72 54,92 40,96 C 26,100 18,88 24,80"
        fill="none" stroke="url(#ga)" stroke-width="3.5" stroke-linecap="round" opacity="0.72"/>

  <!-- ═══ TINY CORNER CURL — bottom-right ═══ -->
  <path d="M 420,340 C 408,360 392,368 378,358 C 364,348 366,328 380,324 C 394,320 402,332 396,340"
        fill="none" stroke="url(#gb)" stroke-width="3.5" stroke-linecap="round" opacity="0.72"/>

  <!-- ═══ STRAY TENDRIL — upper-centre ═══ -->
  <path d="M 185,40 C 200,22 220,16 238,26 C 256,36 255,60 238,66 C 221,72 210,58 218,48"
        fill="none" stroke="url(#gc)" stroke-width="3.2" stroke-linecap="round" opacity="0.68"/>
  <path d="M 185,40 C 178,20 174,8 176,0"  fill="none" stroke="url(#gc)" stroke-width="2.5" stroke-linecap="round" opacity="0.58"/>
  <path d="M 185,40 C 172,22 164,12 158,0" fill="none" stroke="url(#gc)" stroke-width="2"   stroke-linecap="round" opacity="0.52"/>

  <!-- ═══ STRAY TENDRIL — lower-centre ═══ -->
  <path d="M 235,380 C 220,398 200,404 182,394 C 164,384 165,360 182,354 C 199,348 210,362 202,372"
        fill="none" stroke="url(#gc)" stroke-width="3.2" stroke-linecap="round" opacity="0.68"/>
  <path d="M 235,380 C 242,400 246,412 244,420" fill="none" stroke="url(#gc)" stroke-width="2.5" stroke-linecap="round" opacity="0.58"/>
  <path d="M 235,380 C 248,398 256,408 262,420" fill="none" stroke="url(#gc)" stroke-width="2"   stroke-linecap="round" opacity="0.52"/>
</svg>
